<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="22%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#160534"/>
      <stop offset="55%" stop-color="#0A0118"/>
      <stop offset="100%" stop-color="#05000C"/>
    </radialGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FF2BD6" stop-opacity="0.55"/>
    </linearGradient>

    <filter id="nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="280" fill="url(#bgGrad)"/>

  <!-- faint grid -->
  <g stroke="#00F0FF" stroke-opacity="0.05">
    <path d="M0,70 H1200"/>
    <path d="M0,140 H1200"/>
    <path d="M0,210 H1200"/>
    <path d="M150,0 V280"/>
    <path d="M450,0 V280"/>
    <path d="M750,0 V280"/>
    <path d="M1050,0 V280"/>
  </g>

  <!-- static connective lines -->
  <g fill="none" stroke="url(#lineGrad)" stroke-width="1">
    <path d="M80,40 L250,60 L420,40"/>
    <path d="M150,210 L320,230 L500,200"/>
    <path d="M620,70 L800,50 L1100,60"/>
    <path d="M700,220 L880,190 L1020,210"/>
    <path d="M950,80 L1060,140 L960,150 L1020,210"/>
    <path d="M1100,60 L1150,200"/>
  </g>

  <!-- traveling pulse lines (signature motif) -->
  <g fill="none" stroke-width="2" stroke-linecap="round">
    <path d="M620,70 L800,50 L1100,60" stroke="#00F0FF" stroke-dasharray="6 26" opacity="0.9">
      <animate attributeName="stroke-dashoffset" from="0" to="-64" dur="3.2s" repeatCount="indefinite"/>
    </path>
    <path d="M700,220 L880,190 L1020,210" stroke="#FF2BD6" stroke-dasharray="6 30" opacity="0.9">
      <animate attributeName="stroke-dashoffset" from="0" to="-72" dur="3.8s" repeatCount="indefinite"/>
    </path>
    <path d="M80,40 L250,60 L420,40" stroke="#8B5CF6" stroke-dasharray="5 28" opacity="0.85">
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="4.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- nodes -->
  <g filter="url(#nodeGlow)">
    <circle cx="80" cy="40" r="3" fill="#00F0FF"/>
    <circle cx="150" cy="210" r="2.5" fill="#FF2BD6"/>
    <circle cx="250" cy="60" r="2" fill="#8B5CF6"/>
    <circle cx="320" cy="230" r="3" fill="#00F0FF"/>
    <circle cx="420" cy="40" r="2.5" fill="#CCFF00"/>
    <circle cx="500" cy="200" r="2" fill="#FF2BD6"/>
    <circle cx="620" cy="70" r="3" fill="#8B5CF6"/>
    <circle cx="700" cy="220" r="2.5" fill="#00F0FF"/>
    <circle cx="800" cy="50" r="2" fill="#FF2BD6"/>
    <circle cx="880" cy="190" r="3" fill="#CCFF00"/>
    <circle cx="950" cy="80" r="2.5" fill="#8B5CF6"/>
    <circle cx="1020" cy="210" r="2" fill="#00F0FF"/>
    <circle cx="1100" cy="60" r="3" fill="#FF2BD6"/>
    <circle cx="1150" cy="200" r="2.5" fill="#8B5CF6"/>
    <circle cx="1060" cy="140" r="2" fill="#00F0FF"/>
    <circle cx="960" cy="150" r="2.5" fill="#CCFF00"/>
  </g>

  <!-- text block -->
  <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace">
    <text x="64" y="100" font-size="15" letter-spacing="3" fill="#00F0FF" opacity="0.85">// FRONTEND · FULL-STACK ENGINEER</text>

    <text x="62" y="160" font-size="46" font-weight="700" fill="#EAF6FF" filter="url(#textGlow)">YOUR NAME</text>

    <text x="64" y="196" font-size="16" fill="#9A93B8">Building interfaces where logic meets light.</text>
    <rect x="402" y="183" width="10" height="16" fill="#FF2BD6">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
