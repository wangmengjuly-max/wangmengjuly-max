document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:#39d353;font-size:11px;letter-spacing:2px;white-space:nowrap;\">// 08 — EOF<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:linear-gradient(90deg,#143020,transparent);\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;\">\n      <div style=\"flex:1;min-width:260px;display:flex;align-items:center;gap:12px;border:1px solid #143020;border-radius:10px;background:rgba(1,4,9,.72);padding:12px 12px 12px 16px;\">\n        <span style=\"color:#586069;font-size:12px;white-space:nowrap;\">~$ fortune<\u002Fspan>\n        <span style=\"color:#3fb950;font-size:12.5px;flex:1;line-height:1.5;\">{{ quote }}<\u002Fspan>\n        <button onclick=\"{{ nextQuote }}\" style=\"cursor:pointer;background:transparent;border:1px solid #143020;color:#39d353;font-size:12px;border-radius:7px;padding:7px 12px;transition:all .15s;font-family:inherit;white-space:nowrap;\" style-hover=\"background:#06140a;border-color:#39d353;box-shadow:0 0 12px rgba(57,211,83,.3);\">↻ next<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:10px;border:1px solid #143020;border-radius:10px;background:rgba(1,4,9,.72);padding:12px 16px;\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#39d353;box-shadow:0 0 8px #39d353;display:inline-block;animation:floaty 2s ease infinite;\"><\u002Fspan>\n        <span style=\"font-size:12px;color:#8b949e;white-space:nowrap;\">uplink <span data-visitor=\"1\" style=\"color:#39d353;font-weight:700;\">—<\u002Fspan> visitors<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"text-align:center;margin-top:34px;color:#586069;font-size:11px;letter-spacing:1px;\">\n      <span style=\"animation:flick 4s infinite;\">[ connection secure ]<\u002Fspan> &nbsp;·&nbsp; built with caffeine &amp; curiosity &nbsp;·&nbsp; © 2026 longyi-xw\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;matrixRain&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;scanlines&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { quoteIndex: 0, logLines: [] };\n\n  quotes = [\n    \"The world moves forward — and so does `main`.\",\n    \"There are 10 kinds of people: those who read binary and those who don't.\",\n    \"It works on my machine. ¯\\\\_(ツ)_/¯\",\n    \"Weeks of coding can save you hours of planning.\",\n    \"A SQL query walks into a bar, sees two tables, asks: 'Can I JOIN you?'\",\n    \"To understand recursion, you must first understand recursion.\",\n    \"Reverse engineering: because some assembly is required.\",\n    \"99 little bugs in the code — patch one around — 127 little bugs.\",\n    \"I don't always test my code, but when I do, I do it in production.\",\n    \"Real programmers count from zero.\",\n    \"git push --force is just confidence with extra steps.\",\n    \"Hardware: the part you can kick. Software: the part you can only curse at.\"\n  ];\n\n  repos = ['lowcode-3d', 'quantitative-value-system', 'frida-automation-hook', 'longyi-xw'];\n  ops = ['push', 'commit', 'merge', 'rebase', 'pull', 'tag'];\n  msgs = [\n    'wire up agent tool-calling loop', 'fix snake easing on resize', 'add factor screening cache',\n    'hook native open() via frida', 'refactor scene exporter', 'bump three.js to r170',\n    'patch valuation edge case', 'optimize matrix rain fps', 'add dark theme tokens',\n    'resolve merge conflict in main', 'implement watchlist sync', 'strip debug symbols',\n    'add llm retry backoff', 'cleanup unused imports', 'write integration tests'\n  ];\n\n  renderVals() {\n    return {\n      quote: this.quotes[this.state.quoteIndex % this.quotes.length],\n      nextQuote: () => this.setState(s => ({ quoteIndex: (s.quoteIndex + 1) % this.quotes.length })),\n      logLines: this.state.logLines,\n      showMatrix: this.props.matrixRain !== false,\n      showScan: this.props.scanlines !== false\n    };\n  }\n\n  makeLog() {\n    const r = a => a[Math.floor(Math.random() * a.length)];\n    const d = new Date();\n    const p = n => String(n).padStart(2, '0');\n    return {\n      t: p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds()),\n      h: Math.random().toString(16).slice(2, 9),\n      op: r(this.ops),\n      msg: r(this.msgs),\n      repo: r(this.repos)\n    };\n  }\n\n  componentDidMount() {\n    const seed = [];\n    for (let i = 0; i < 7; i++) seed.push(this.makeLog());\n    this.setState({ logLines: seed });\n\n    this.animateCounters();\n    this.initVisitor();\n    document.querySelectorAll('canvas[data-snake]').forEach(c => {\n      if (!c.dataset.snakeOn) { c.dataset.snakeOn = '1'; this.initSnake(c); }\n    });\n    document.querySelectorAll('canvas[data-matrix]').forEach(c => {\n      if (!c.dataset.matrixOn) { c.dataset.matrixOn = '1'; this.initMatrix(c); }\n    });\n    document.querySelectorAll('[data-words]').forEach(el => this.initType(el));\n    this.initClock();\n\n    this._logTimer = setInterval(() => {\n      this.setState(s => ({ logLines: [...s.logLines, this.makeLog()].slice(-7) }));\n    }, 1900);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._logTimer);\n    clearInterval(this._clockTimer);\n  }\n\n  initType(el) {\n    const words = (el.dataset.words || '').split('|');\n    let wi = 0, ci = 0, deleting = false;\n    const tick = () => {\n      const w = words[wi];\n      if (!deleting) {\n        ci++;\n        if (ci > w.length) { deleting = true; el.textContent = w; setTimeout(tick, 1300); return; }\n      } else {\n        ci--;\n        if (ci < 0) { deleting = false; wi = (wi + 1) % words.length; ci = 0; }\n      }\n      el.textContent = w.substring(0, Math.max(0, ci));\n      setTimeout(tick, deleting ? 42 : 78);\n    };\n    tick();\n  }\n\n  initClock() {\n    const boot = Date.now();\n    const t = document.querySelector('[data-clock]');\n    const u = document.querySelector('[data-uptime]');\n    const p = n => String(n).padStart(2, '0');\n    const upd = () => {\n      const d = new Date();\n      if (t) t.textContent = p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());\n      const s = Math.floor((Date.now() - boot) / 1000);\n      if (u) u.textContent = p(Math.floor(s / 60)) + ':' + p(s % 60);\n    };\n    upd();\n    this._clockTimer = setInterval(upd, 1000);\n  }\n\n  animateCounters() {\n    const fmt = n => Math.round(n).toLocaleString('en-US');\n    document.querySelectorAll('[data-count]').forEach(el => {\n      const target = parseFloat(el.dataset.count);\n      const dur = 1300, start = performance.now();\n      const tick = now => {\n        const t = Math.min(1, (now - start) / dur);\n        const e = 1 - Math.pow(1 - t, 3);\n        el.textContent = fmt(target * e);\n        if (t < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    });\n  }\n\n  initVisitor() {\n    let target = 13800;\n    try {\n      const k = 'longyi_profile_visits';\n      let v = parseInt(localStorage.getItem(k) || '0', 10);\n      if (!v) v = 13800 + Math.floor(Math.random() * 260);\n      v += 1;\n      localStorage.setItem(k, String(v));\n      target = v;\n    } catch (e) {}\n    const spans = document.querySelectorAll('[data-visitor]');\n    const dur = 1500, start = performance.now();\n    const tick = now => {\n      const t = Math.min(1, (now - start) / dur);\n      const e = 1 - Math.pow(1 - t, 3);\n      const val = Math.round(target * e).toLocaleString('en-US');\n      spans.forEach(s => { s.textContent = val; });\n      if (t < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  initSnake(canvas) {\n    const COLS = 52, ROWS = 7, CELL = 12, GAP = 3;\n    const W = COLS * (CELL + GAP) - GAP, H = ROWS * (CELL + GAP) - GAP;\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    canvas.width = W * dpr; canvas.height = H * dpr;\n    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';\n    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);\n    const greens = ['#0d1f15', '#0e4429', '#006d32', '#26a641', '#39d353'];\n    const rr = (x, y, w, h, r) => {\n      ctx.beginPath();\n      ctx.moveTo(x + r, y);\n      ctx.arcTo(x + w, y, x + w, y + h, r);\n      ctx.arcTo(x + w, y + h, x, y + h, r);\n      ctx.arcTo(x, y + h, x, y, r);\n      ctx.arcTo(x, y, x + w, y, r);\n      ctx.closePath();\n    };\n    let grid = [];\n    const seed = () => {\n      for (let x = 0; x < COLS; x++) {\n        grid[x] = [];\n        for (let y = 0; y < ROWS; y++) grid[x][y] = Math.random() < 0.5 ? (Math.floor(Math.random() * 4) + 1) : 0;\n      }\n    };\n    seed();\n    const path = [];\n    for (let x = 0; x < COLS; x++) {\n      if (x % 2 === 0) { for (let y = 0; y < ROWS; y++) path.push([x, y]); }\n      else { for (let y = ROWS - 1; y >= 0; y--) path.push([x, y]); }\n    }\n    const LEN = 10;\n    let head = -1;\n    const eaten = new Set();\n    const draw = () => {\n      ctx.clearRect(0, 0, W, H);\n      for (let x = 0; x < COLS; x++) for (let y = 0; y < ROWS; y++) {\n        const lvl = eaten.has(x + ',' + y) ? 0 : grid[x][y];\n        ctx.fillStyle = greens[lvl];\n        rr(x * (CELL + GAP), y * (CELL + GAP), CELL, CELL, 2); ctx.fill();\n      }\n      for (let i = 0; i < LEN; i++) {\n        const idx = head - i;\n        if (idx < 0 || idx >= path.length) continue;\n        const c = path[idx], t = 1 - i / LEN;\n        if (i === 0) {\n          ctx.shadowColor = '#39d353'; ctx.shadowBlur = 10; ctx.fillStyle = '#ddffdd';\n        } else {\n          ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(57,211,83,' + (0.3 + 0.6 * t).toFixed(2) + ')';\n        }\n        rr(c[0] * (CELL + GAP), c[1] * (CELL + GAP), CELL, CELL, 3); ctx.fill();\n      }\n      ctx.shadowBlur = 0;\n    };\n    let last = 0;\n    const loop = ts => {\n      if (ts - last > 60) {\n        last = ts;\n        head++;\n        const n = path[head];\n        if (n) eaten.add(n[0] + ',' + n[1]);\n        if (head > path.length + LEN) { head = -1; eaten.clear(); seed(); }\n        draw();\n      }\n      requestAnimationFrame(loop);\n    };\n    requestAnimationFrame(loop);\n  }\n\n  initMatrix(canvas) {\n    const ctx = canvas.getContext('2d');\n    const fontSize = 14;\n    let cols = 0, drops = [];\n    const resize = () => {\n      canvas.width = window.innerWidth;\n      canvas.height = window.innerHeight;\n      cols = Math.floor(canvas.width / fontSize);\n      drops = new Array(cols).fill(0).map(() => Math.random() * -50);\n    };\n    resize();\n    window.addEventListener('resize', resize);\n    const chars = '01<>/{}[]#$%&abcdef日本码字節0192longyixw'.split('');\n    let last = 0;\n    const frame = ts => {\n      if (ts - last > 52) {\n        last = ts;\n        ctx.fillStyle = 'rgba(1,4,9,0.085)';\n        ctx.fillRect(0, 0, canvas.width, canvas.height);\n        ctx.font = fontSize + 'px monospace';\n        for (let i = 0; i < drops.length; i++) {\n          const ch = chars[Math.floor(Math.random() * chars.length)];\n          const x = i * fontSize, y = drops[i] * fontSize;\n          ctx.fillStyle = Math.random() < 0.028 ? 'rgba(140,255,160,0.65)' : 'rgba(35,134,54,0.32)';\n          ctx.fillText(ch, x, y);\n          if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;\n          drops[i] += 0.5;\n        }\n      }\n      requestAnimationFrame(frame);\n    };\n    requestAnimationFrame(frame);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
