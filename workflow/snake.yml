name: generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 0 点自动重新生成一次
  workflow_dispatch:        # 也允许在 Actions 页面手动点击运行
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate neon snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-neon.svg?color_snake=%2300F0FF&color_dots=%230A0118,%23391C66,%238B5CF6,%23FF2BD6,%2300F0FF

      - name: push snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
